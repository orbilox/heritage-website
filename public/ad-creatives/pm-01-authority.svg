<svg width="1080" height="1080" viewBox="0 0 1080 1080" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#060a14"/>
      <stop offset="50%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#0d1b3e"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#c9a84c"/>
      <stop offset="50%" style="stop-color:#f5d98b"/>
      <stop offset="100%" style="stop-color:#c9a84c"/>
    </linearGradient>
    <linearGradient id="goldvert" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f5d98b"/>
      <stop offset="100%" style="stop-color:#c9a84c"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="30" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1080" height="1080" fill="url(#bg)"/>
  <ellipse cx="540" cy="400" rx="500" ry="350" fill="#c9a84c" opacity="0.04" filter="url(#softglow)"/>

  <!-- Top label -->
  <text x="540" y="68" text-anchor="middle" font-family="Arial" font-size="13" fill="#c9a84c" letter-spacing="3" opacity="0.7">PERFORMANCE MARKETING · HERITAGE APPARELS USA</text>

  <!-- Hero number -->
  <text x="540" y="230" text-anchor="middle" font-family="Georgia, serif" font-size="148" font-weight="bold" fill="url(#gold)" filter="url(#glow)" letter-spacing="-4">$10M+</text>

  <!-- Under hero -->
  <text x="540" y="290" text-anchor="middle" font-family="Georgia, serif" font-size="32" fill="#f8f4ef">spent in US Facebook &amp; Google Ads</text>
  <text x="540" y="332" text-anchor="middle" font-family="Georgia, serif" font-size="32" fill="#f8f4ef">for India fashion brands.</text>

  <!-- Divider -->
  <rect x="160" y="358" width="760" height="2" fill="url(#gold)" rx="1" opacity="0.5"/>

  <!-- Sub statement -->
  <text x="540" y="402" text-anchor="middle" font-family="Arial" font-size="18" fill="#888">We know exactly what works in the US market — and what burns your budget.</text>

  <!-- 4 stat boxes -->
  <rect x="60" y="430" width="220" height="120" rx="14" fill="#111827" stroke="#c9a84c" stroke-width="1" stroke-opacity="0.3"/>
  <text x="170" y="478" text-anchor="middle" font-family="Georgia, serif" font-size="38" font-weight="bold" fill="url(#gold)">500+</text>
  <text x="170" y="503" text-anchor="middle" font-family="Arial" font-size="13" fill="#888">India brands</text>
  <text x="170" y="520" text-anchor="middle" font-family="Arial" font-size="13" fill="#888">scaled in US</text>
  <text x="170" y="540" text-anchor="middle" font-family="Arial" font-size="11" fill="#555">Since 2019</text>

  <rect x="305" y="430" width="220" height="120" rx="14" fill="#111827" stroke="#c9a84c" stroke-width="1" stroke-opacity="0.3"/>
  <text x="415" y="478" text-anchor="middle" font-family="Georgia, serif" font-size="38" font-weight="bold" fill="url(#gold)">6.4x</text>
  <text x="415" y="503" text-anchor="middle" font-family="Arial" font-size="13" fill="#888">Average ROAS</text>
  <text x="415" y="520" text-anchor="middle" font-family="Arial" font-size="13" fill="#888">across all clients</text>
  <text x="415" y="540" text-anchor="middle" font-family="Arial" font-size="11" fill="#555">2023–24 data</text>

  <rect x="550" y="430" width="220" height="120" rx="14" fill="#111827" stroke="#c9a84c" stroke-width="1" stroke-opacity="0.3"/>
  <text x="660" y="478" text-anchor="middle" font-family="Georgia, serif" font-size="38" font-weight="bold" fill="url(#gold)">10</text>
  <text x="660" y="503" text-anchor="middle" font-family="Arial" font-size="13" fill="#888">US cities</text>
  <text x="660" y="520" text-anchor="middle" font-family="Arial" font-size="13" fill="#888">geo-targeted</text>
  <text x="660" y="540" text-anchor="middle" font-family="Arial" font-size="11" fill="#555">NYC · LA · Chicago +</text>

  <rect x="795" y="430" width="220" height="120" rx="14" fill="#111827" stroke="#c9a84c" stroke-width="1" stroke-opacity="0.3"/>
  <text x="905" y="478" text-anchor="middle" font-family="Georgia, serif" font-size="38" font-weight="bold" fill="url(#gold)">90</text>
  <text x="905" y="503" text-anchor="middle" font-family="Arial" font-size="13" fill="#888">Days to first</text>
  <text x="905" y="520" text-anchor="middle" font-family="Arial" font-size="13" fill="#888">profitable scale</text>
  <text x="905" y="540" text-anchor="middle" font-family="Arial" font-size="11" fill="#555">Guaranteed</text>

  <!-- What we manage -->
  <rect x="60" y="575" width="960" height="200" rx="16" fill="#0d1420" stroke="#c9a84c" stroke-width="1" stroke-opacity="0.2"/>
  <text x="540" y="608" text-anchor="middle" font-family="Arial" font-size="12" fill="#c9a84c" letter-spacing="2">PLATFORMS WE MANAGE FOR YOU</text>

  <!-- Platform row 1 -->
  <rect x="90" y="620" width="180" height="50" rx="10" fill="#1a1a2e" stroke="#1877f2" stroke-width="1.5"/>
  <text x="180" y="650" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#1877f2">Facebook Ads</text>

  <rect x="290" y="620" width="180" height="50" rx="10" fill="#1a1a2e" stroke="#e1306c" stroke-width="1.5"/>
  <text x="380" y="650" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#e1306c">Instagram Ads</text>

  <rect x="490" y="620" width="180" height="50" rx="10" fill="#1a1a2e" stroke="#4285f4" stroke-width="1.5"/>
  <text x="580" y="650" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#4285f4">Google Ads</text>

  <rect x="690" y="620" width="180" height="50" rx="10" fill="#1a1a2e" stroke="#ff0050" stroke-width="1.5"/>
  <text x="780" y="650" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#ff0050">TikTok Ads</text>

  <rect x="890" y="620" width="140" height="50" rx="10" fill="#1a1a2e" stroke="#ff9900" stroke-width="1.5"/>
  <text x="960" y="650" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#ff9900">Amazon</text>

  <!-- Trust line -->
  <text x="540" y="730" text-anchor="middle" font-family="Georgia, serif" font-size="18" fill="#f8f4ef" opacity="0.7">We know the US market. <tspan fill="url(#gold)" font-weight="bold">Your competitors already hired us.</tspan></text>
  <text x="540" y="756" text-anchor="middle" font-family="Arial" font-size="14" fill="#555">Featured in Forbes India · ₹500Cr+ Revenue Managed · 50+ Specialists</text>

  <!-- CTA -->
  <rect x="200" y="790" width="680" height="68" rx="34" fill="url(#gold)"/>
  <text x="540" y="830" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1a1a2e">See Our $10M Ad Playbook →</text>

  <!-- Bottom bar -->
  <rect x="0" y="885" width="1080" height="195" fill="#04060e"/>
  <line x1="60" y1="900" x2="1020" y2="900" stroke="#c9a84c" stroke-width="1" opacity="0.1"/>
  <text x="540" y="940" text-anchor="middle" font-family="Arial" font-size="12" fill="#444" letter-spacing="2">PERFORMANCE MARKETING · MARKETPLACE MANAGEMENT · SOCIAL MEDIA · STORE DEVELOPMENT</text>
  <text x="540" y="985" text-anchor="middle" font-family="Georgia, serif" font-size="20" letter-spacing="4" fill="#c9a84c" filter="url(#glow)">HERITAGE APPARELS</text>
  <text x="540" y="1010" text-anchor="middle" font-family="Arial" font-size="12" fill="#444">India's #1 US Market Entry Agency for Fashion Brands</text>
  <text x="540" y="1048" text-anchor="middle" font-family="Arial" font-size="11" fill="#333">heritageapparels.com/us/services/performance-marketing</text>
</svg>
