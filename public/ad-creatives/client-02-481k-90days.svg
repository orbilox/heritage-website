<svg width="1080" height="1080" viewBox="0 0 1080 1080" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#060a14"/>
      <stop offset="55%" style="stop-color:#0d1628"/>
      <stop offset="100%" style="stop-color:#0a1b3e"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#c9a84c"/>
      <stop offset="50%" style="stop-color:#f5d98b"/>
      <stop offset="100%" style="stop-color:#c9a84c"/>
    </linearGradient>
    <linearGradient id="screenfade" x1="0%" y1="80%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#060a14" stop-opacity="0"/>
      <stop offset="100%" style="stop-color:#060a14" stop-opacity="1"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="7" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="34" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="dropshadow">
      <feDropShadow dx="0" dy="10" stdDeviation="24" flood-color="#000000" flood-opacity="0.65"/>
    </filter>
    <clipPath id="screenClip">
      <rect x="200" y="340" width="680" height="440" rx="16"/>
    </clipPath>
  </defs>

  <rect width="1080" height="1080" fill="url(#bg)"/>
  <ellipse cx="540" cy="520" rx="500" ry="380" fill="#c9a84c" opacity="0.04" filter="url(#softglow)"/>

  <!-- Top label -->
  <text x="540" y="52" text-anchor="middle" font-family="Arial" font-size="11" fill="#c9a84c" letter-spacing="3" opacity="0.7">REAL CLIENT RESULT · US D2C FASHION BRAND · 90 DAYS</text>

  <!-- Headline -->
  <text x="540" y="104" text-anchor="middle" font-family="Georgia, serif" font-size="34" font-weight="bold" fill="#f8f4ef">90 Days with Heritage Apparels</text>

  <!-- Big numbers row -->
  <rect x="60" y="122" width="290" height="102" rx="14" fill="#0d1420" stroke="#96bf48" stroke-width="1.5"/>
  <text x="205" y="152" text-anchor="middle" font-family="Arial" font-size="10" fill="#96bf48" letter-spacing="1">TOTAL REVENUE</text>
  <text x="205" y="196" text-anchor="middle" font-family="Georgia, serif" font-size="38" font-weight="bold" fill="#96bf48" filter="url(#glow)">$481,878</text>

  <rect x="395" y="122" width="290" height="102" rx="14" fill="#0d1420" stroke="#f5d98b" stroke-width="1.5"/>
  <text x="540" y="152" text-anchor="middle" font-family="Arial" font-size="10" fill="#f5d98b" letter-spacing="1">REVENUE GROWTH</text>
  <text x="540" y="196" text-anchor="middle" font-family="Georgia, serif" font-size="58" font-weight="bold" fill="url(#gold)" filter="url(#glow)">+265%</text>

  <rect x="730" y="122" width="290" height="102" rx="14" fill="#0d1420" stroke="#4285f4" stroke-width="1.5"/>
  <text x="875" y="152" text-anchor="middle" font-family="Arial" font-size="10" fill="#4285f4" letter-spacing="1">TOTAL ORDERS</text>
  <text x="875" y="196" text-anchor="middle" font-family="Georgia, serif" font-size="38" font-weight="bold" fill="#f8f4ef">716</text>
  <text x="875" y="218" text-anchor="middle" font-family="Arial" font-size="12" fill="#96bf48">↑ 214%</text>

  <!-- Gold rule -->
  <rect x="100" y="242" width="880" height="1.5" fill="url(#gold)" rx="1" opacity="0.35"/>

  <!-- REAL Screenshot embedded in phone/tablet frame -->
  <rect x="196" y="278" width="688" height="520" rx="22" fill="#111" stroke="#c9a84c" stroke-width="2" filter="url(#dropshadow)"/>
  <!-- Status bar -->
  <rect x="196" y="278" width="688" height="36" rx="20" fill="#1a1f2e"/>
  <text x="226" y="302" font-family="Arial" font-size="11" fill="#888">10:27</text>
  <circle cx="860" cy="296" r="4" fill="#96bf48"/>
  <text x="870" y="300" font-family="Arial" font-size="10" fill="#96bf48">48%</text>

  <!-- Screenshot image -->
  <image href="/our-client-results/1.jpg" x="200" y="314" width="680" height="440" clip-path="url(#screenClip)" preserveAspectRatio="xMidYMin slice"/>
  <!-- Bottom fade -->
  <rect x="200" y="340" width="680" height="440" rx="16" fill="url(#screenfade)"/>

  <!-- Heritage badge overlay -->
  <rect x="300" y="752" width="480" height="28" rx="6" fill="#c9a84c" opacity="0.18" stroke="#c9a84c" stroke-width="1"/>
  <text x="540" y="771" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#f5d98b">✦ Managed by Heritage Apparels · Google + Meta Ads</text>

  <!-- Home indicator -->
  <rect x="460" y="790" width="160" height="4" rx="2" fill="#333"/>

  <!-- Bottom quote strip -->
  <rect x="60" y="824" width="960" height="62" rx="12" fill="#0d1420" stroke="#c9a84c" stroke-width="1" stroke-opacity="0.3"/>
  <text x="540" y="850" text-anchor="middle" font-family="Georgia, serif" font-size="17" fill="#888">"We went from struggling to</text>
  <text x="540" y="874" text-anchor="middle" font-family="Georgia, serif" font-size="17" fill="url(#gold)" font-weight="bold">$481K in 90 days. Heritage changed everything."</text>

  <!-- CTA -->
  <rect x="190" y="908" width="700" height="62" rx="31" fill="url(#gold)"/>
  <text x="540" y="944" text-anchor="middle" font-family="Georgia, serif" font-size="21" font-weight="bold" fill="#1a1a2e">Scale Your Brand Like This → Start Now</text>

  <!-- Bottom bar -->
  <rect x="0" y="992" width="1080" height="88" fill="#04060e"/>
  <line x1="60" y1="1004" x2="1020" y2="1004" stroke="#c9a84c" stroke-width="1" opacity="0.1"/>
  <text x="540" y="1042" text-anchor="middle" font-family="Georgia, serif" font-size="17" letter-spacing="4" fill="#c9a84c">HERITAGE APPARELS</text>
  <text x="540" y="1064" text-anchor="middle" font-family="Arial" font-size="11" fill="#333">heritageapparels.com/us/services/performance-marketing</text>
</svg>
