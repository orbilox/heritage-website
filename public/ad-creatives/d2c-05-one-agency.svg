  <line x1="60" y1="964" x2="1020" y2="964" stroke="#c9a84c" stroke-width="1" opacity="0.1"/>
  <text x="540" y="1006" text-anchor="middle" font-family="Arial" font-size="12" fill="#444" letter-spacing="1">PERFORMANCE · MARKETPLACE · SOCIAL MEDIA · STORE DEVELOPMENT</text>
  <text x="540" y="1046" text-anchor="middle" font-family="Georgia, serif" font-size="18" letter-spacing="4" fill="#c9a84c">HERITAGE APPARELS</text>
  <text x="540" y="1068" text-anchor="middle" font-family="Arial" font-size="11" fill="#333">heritageapparels.com/us/services · India's #1 US Market Entry Agency</text>
