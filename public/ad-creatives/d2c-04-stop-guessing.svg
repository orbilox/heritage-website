<svg width="1080" height="1080" viewBox="0 0 1080 1080" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#060a14"/>
      <stop offset="50%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#0d1b3e"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#c9a84c"/>
      <stop offset="50%" style="stop-color:#f5d98b"/>
      <stop offset="100%" style="stop-color:#c9a84c"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="30" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1080" height="1080" fill="url(#bg)"/>
  <ellipse cx="540" cy="420" rx="500" ry="380" fill="#c9a84c" opacity="0.04" filter="url(#softglow)"/>

  <!-- Top badge -->
  <text x="540" y="62" text-anchor="middle" font-family="Arial" font-size="13" fill="#c9a84c" letter-spacing="3" opacity="0.7">FREE STRATEGY SESSION · HERITAGE APPARELS</text>

  <!-- Big crossed out word -->
  <text x="540" y="168" text-anchor="middle" font-family="Georgia, serif" font-size="90" font-weight="bold" fill="#444">Guessing.</text>
  <!-- Red strikethrough -->
  <rect x="90" y="138" width="900" height="8" rx="4" fill="#ff4444" opacity="0.9"/>

  <text x="540" y="272" text-anchor="middle" font-family="Georgia, serif" font-size="60" font-weight="bold" fill="url(#gold)" filter="url(#glow)">Start Scaling.</text>

  <text x="540" y="326" text-anchor="middle" font-family="Arial" font-size="18" fill="#888">Your D2C brand deserves a proven growth system — not trial and error.</text>

