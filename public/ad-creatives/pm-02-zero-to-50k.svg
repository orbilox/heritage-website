  <text x="540" y="290" text-anchor="middle" font-family="Georgia, serif" font-size="36" fill="#f8f4ef">/month in US sales.</text>
  <text x="540" y="332" text-anchor="middle" font-family="Georgia, serif" font-size="28" fill="#888">In just 90 days. For a Mumbai ethnic wear brand.</text>

