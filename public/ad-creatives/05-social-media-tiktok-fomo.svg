<svg width="1080" height="1080" viewBox="0 0 1080 1080" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a1a"/>
      <stop offset="50%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#0d0d22"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#c9a84c"/>
      <stop offset="50%" style="stop-color:#f5d98b"/>
      <stop offset="100%" style="stop-color:#c9a84c"/>
    </linearGradient>
    <linearGradient id="tiktok" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff0050"/>
      <stop offset="100%" style="stop-color:#00f2ea"/>
    </linearGradient>
    <linearGradient id="redpill" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff0050"/>
      <stop offset="100%" style="stop-color:#cc0040"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="redglow">
      <feGaussianBlur stdDeviation="10" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="20" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1080" height="1080" fill="url(#bg)"/>

  <!-- Red glow blob top left (competitor side) -->
  <ellipse cx="200" cy="300" rx="250" ry="200" fill="#ff0050" opacity="0.05" filter="url(#softglow)"/>
  <!-- Gold glow blob bottom right (Heritage side) -->
  <ellipse cx="880" cy="800" rx="250" ry="200" fill="#c9a84c" opacity="0.07" filter="url(#softglow)"/>

  <!-- TikTok logo mark (simplified) top center -->
  <text x="540" y="80" text-anchor="middle" font-family="Arial" font-size="14" fill="#ff0050" letter-spacing="3" opacity="0.6">TIKTOK SHOP · SOCIAL COMMERCE REALITY</text>

  <!-- MAIN SHOCK HEADLINE -->
  <text x="540" y="168" text-anchor="middle" font-family="Georgia, serif" font-size="50" font-weight="bold" fill="#ff0050" filter="url(#redglow)">Your Competitor's</text>
  <text x="540" y="232" text-anchor="middle" font-family="Georgia, serif" font-size="50" font-weight="bold" fill="#ff0050" filter="url(#redglow)">TikTok Is</text>

  <!-- KILLING YOU - massive -->
  <text x="540" y="338" text-anchor="middle" font-family="Georgia, serif" font-size="90" font-weight="bold" fill="#ffffff" filter="url(#redglow)" letter-spacing="-2">KILLING YOU.</text>

  <!-- Underline -->
  <rect x="120" y="356" width="840" height="3" fill="url(#tiktok)" rx="2"/>

  <!-- Split screen comparison -->
  <!-- LEFT: Competitor phone mockup -->
  <rect x="60" y="385" width="430" height="340" rx="16" fill="#0d0d20" stroke="#ff0050" stroke-width="1.5"/>
  <text x="275" y="415" text-anchor="middle" font-family="Arial" font-size="11" fill="#ff0050" letter-spacing="2">YOUR COMPETITOR</text>

  <!-- Phone outline -->
  <rect x="140" y="430" width="180" height="260" rx="20" fill="#111" stroke="#ff0050" stroke-width="1.5"/>
  <rect x="200" y="436" width="60" height="8" rx="4" fill="#222"/>
  <!-- TikTok feed inside phone -->
  <rect x="145" y="448" width="170" height="236" rx="16" fill="#000"/>
  <!-- Video content mockup -->
  <rect x="145" y="448" width="170" height="236" rx="16" fill="#1a0010"/>
  <text x="230" y="510" text-anchor="middle" font-family="Arial" font-size="28" fill="#ff0050">♪</text>
  <text x="230" y="545" text-anchor="middle" font-family="Arial" font-size="10" fill="#fff" opacity="0.7">@competitor_brand</text>
  <text x="230" y="563" text-anchor="middle" font-family="Arial" font-size="9" fill="#fff" opacity="0.5">New Collection Drop 🔥</text>
  <!-- Metrics -->
  <text x="310" y="490" text-anchor="end" font-family="Arial" font-size="9" fill="#fff" opacity="0.7">❤️ 48.2K</text>
  <text x="310" y="508" text-anchor="end" font-family="Arial" font-size="9" fill="#fff" opacity="0.7">💬 3.1K</text>
  <text x="310" y="526" text-anchor="end" font-family="Arial" font-size="9" fill="#fff" opacity="0.7">↗ 12K</text>
  <!-- View count -->
  <rect x="155" y="455" width="70" height="18" rx="4" fill="#ff0050" opacity="0.9"/>
  <text x="190" y="468" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#fff">1.2M VIEWS</text>

  <!-- Stats below competitor phone -->
  <text x="275" y="610" text-anchor="middle" font-family="Georgia, serif" font-size="32" font-weight="bold" fill="#ff0050">$84,000</text>
  <text x="275" y="635" text-anchor="middle" font-family="Arial" font-size="12" fill="#888">Revenue this month</text>
  <text x="275" y="660" text-anchor="middle" font-family="Arial" font-size="11" fill="#555">from TikTok Shop alone</text>
  <text x="275" y="698" text-anchor="middle" font-family="Arial" font-size="11" fill="#ff0050">Growing 40% MoM ↑</text>

  <!-- Divider -->
  <line x1="540" y1="395" x2="540" y2="715" stroke="#333" stroke-width="1" stroke-dasharray="6,4"/>
  <circle cx="540" cy="555" r="22" fill="#1a1a2e" stroke="#c9a84c" stroke-width="1.5"/>
  <text x="540" y="560" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#c9a84c">VS</text>

  <!-- RIGHT: Your brand (no social) -->
  <rect x="590" y="385" width="430" height="340" rx="16" fill="#0d0d20" stroke="#333" stroke-width="1.5"/>
  <text x="805" y="415" text-anchor="middle" font-family="Arial" font-size="11" fill="#666" letter-spacing="2">YOUR BRAND</text>

  <!-- Empty phone -->
  <rect x="675" y="430" width="180" height="260" rx="20" fill="#111" stroke="#333" stroke-width="1.5"/>
  <rect x="735" y="436" width="60" height="8" rx="4" fill="#222"/>
  <rect x="680" y="448" width="170" height="236" rx="16" fill="#0a0a12"/>
  <!-- Empty state -->
  <text x="765" y="540" text-anchor="middle" font-family="Arial" font-size="40" fill="#222">📷</text>
  <text x="765" y="575" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">No content posted</text>
  <text x="765" y="592" text-anchor="middle" font-family="Arial" font-size="9" fill="#282828">Last post: 3 months ago</text>

  <text x="805" y="610" text-anchor="middle" font-family="Georgia, serif" font-size="32" font-weight="bold" fill="#444">$0</text>
  <text x="805" y="635" text-anchor="middle" font-family="Arial" font-size="12" fill="#444">Revenue from social</text>
  <text x="805" y="660" text-anchor="middle" font-family="Arial" font-size="11" fill="#333">No TikTok presence</text>
  <text x="805" y="698" text-anchor="middle" font-family="Arial" font-size="11" fill="#555">Losing ground every day ↓</text>

  <!-- Wake up call box -->
  <rect x="60" y="742" width="960" height="80" rx="12" fill="#ff0050" opacity="0.1" stroke="#ff0050" stroke-width="1" stroke-opacity="0.4"/>
  <text x="540" y="776" text-anchor="middle" font-family="Georgia, serif" font-size="20" fill="#f8f4ef">Every day without a TikTok presence = <tspan fill="#ff0050" font-weight="bold">lost revenue.</tspan></text>
  <text x="540" y="806" text-anchor="middle" font-family="Arial" font-size="14" fill="#888">We create, post &amp; manage your brand's social content across TikTok, Instagram &amp; YouTube Shorts.</text>

  <!-- CTA -->
  <rect x="230" y="848" width="620" height="68" rx="34" fill="url(#gold)"/>
  <text x="540" y="888" text-anchor="middle" font-family="Georgia, serif" font-size="21" font-weight="bold" fill="#1a1a2e">Start Posting. Start Selling. →</text>

  <!-- Bottom bar -->
  <rect x="0" y="940" width="1080" height="140" fill="#060a14"/>
  <text x="540" y="985" text-anchor="middle" font-family="Arial" font-size="12" fill="#555" letter-spacing="1">30 POSTS/MONTH · TIKTOK + INSTAGRAM + YOUTUBE SHORTS · US-TARGETED CONTENT</text>
  <line x1="60" y1="1000" x2="1020" y2="1000" stroke="#c9a84c" stroke-width="1" opacity="0.15"/>
  <text x="540" y="1030" text-anchor="middle" font-family="Georgia, serif" font-size="16" letter-spacing="3" fill="#c9a84c">HERITAGE APPARELS</text>
  <text x="540" y="1055" text-anchor="middle" font-family="Arial" font-size="11" fill="#444">heritageapparels.com/us/services/social-media</text>
</svg>
