  <text x="540" y="738" text-anchor="middle" font-family="Georgia, serif" font-size="21" fill="#f8f4ef">Every month without ads = <tspan fill="#ff4444" font-weight="bold">$52,960 in lost sales</tspan> to competitors.</text>
  <text x="540" y="760" text-anchor="middle" font-family="Arial" font-size="14" fill="#888">Heritage gets you running Google + Meta ads for your fashion brand at just $500/month.</text>

  <!-- CTA -->
