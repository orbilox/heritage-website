  <text x="540" y="832" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1a1a2e">Start Running Ads for $500/Month →</text>
  <text x="540" y="854" text-anchor="middle" font-family="Arial" font-size="13" fill="#1a1a2e" opacity="0.7">Google Shopping · Meta Feed · Instagram · Reels · Retargeting</text>

  <!-- Bottom bar -->
  <rect x="0" y="892" width="1080" height="188" fill="#04060e"/>
  <line x1="60" y1="906" x2="1020" y2="906" stroke="#c9a84c" stroke-width="1" opacity="0.1"/>

  <text x="210" y="948" text-anchor="middle" font-family="Georgia, serif" font-size="24" font-weight="bold" fill="url(#gold)">500+</text>
  <text x="210" y="970" text-anchor="middle" font-family="Arial" font-size="11" fill="#555">Fashion brands scaled</text>
  <line x1="380" y1="930" x2="380" y2="980" stroke="#c9a84c" stroke-width="1" opacity="0.15"/>
  <text x="540" y="948" text-anchor="middle" font-family="Georgia, serif" font-size="24" font-weight="bold" fill="url(#gold)">$500/mo</text>
  <text x="540" y="970" text-anchor="middle" font-family="Arial" font-size="11" fill="#555">All-in management fee</text>
  <line x1="700" y1="930" x2="700" y2="980" stroke="#c9a84c" stroke-width="1" opacity="0.15"/>
  <text x="870" y="948" text-anchor="middle" font-family="Georgia, serif" font-size="24" font-weight="bold" fill="url(#gold)">30 Days</text>
  <text x="870" y="970" text-anchor="middle" font-family="Arial" font-size="11" fill="#555">To first results</text>

  <text x="540" y="1020" text-anchor="middle" font-family="Georgia, serif" font-size="17" letter-spacing="4" fill="#c9a84c">HERITAGE APPARELS</text>
  <text x="540" y="1060" text-anchor="middle" font-family="Arial" font-size="11" fill="#333">heritageapparels.com/us/services/performance-marketing</text>
