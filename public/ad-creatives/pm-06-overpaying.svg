  <text x="540" y="146" text-anchor="middle" font-family="Georgia, serif" font-size="50" font-weight="bold" fill="#f8f4ef">Are You Overpaying</text>
  <text x="540" y="204" text-anchor="middle" font-family="Georgia, serif" font-size="50" font-weight="bold" fill="#f8f4ef">for US Fashion Ads?</text>
  <text x="540" y="248" text-anchor="middle" font-family="Arial" font-size="18" fill="#888">Most India brands pay 3–5× more than they should.</text>

  <!-- Gold rule -->
  <rect x="200" y="268" width="680" height="2" fill="url(#gold)" rx="1" opacity="0.4"/>

