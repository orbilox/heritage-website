  <line x1="650" y1="288" x2="650" y2="622" stroke="#1a2030" stroke-width="1"/>

  <!-- Savings callout -->
  <rect x="60" y="644" width="960" height="68" rx="12" fill="#c9a84c" opacity="0.1" stroke="#c9a84c" stroke-width="1" stroke-opacity="0.3"/>
  <text x="540" y="678" text-anchor="middle" font-family="Georgia, serif" font-size="22" fill="#f8f4ef">Brands switching to Heritage save an average of</text>
  <text x="540" y="702" text-anchor="middle" font-family="Georgia, serif" font-size="22" fill="url(#gold)" font-weight="bold">$3,800/month in wasted ad spend.</text>

  <!-- CTA -->
  <rect x="190" y="732" width="700" height="68" rx="34" fill="url(#gold)"/>
  <text x="540" y="772" text-anchor="middle" font-family="Georgia, serif" font-size="21" font-weight="bold" fill="#1a1a2e">See Your True Ad Cost Potential →</text>

  <!-- Bottom bar -->
  <rect x="0" y="822" width="1080" height="258" fill="#04060e"/>
  <line x1="60" y1="837" x2="1020" y2="837" stroke="#c9a84c" stroke-width="1" opacity="0.1"/>
  <text x="540" y="880" text-anchor="middle" font-family="Arial" font-size="12" fill="#444" letter-spacing="1">DATA FROM 500+ MANAGED BRANDS · 2023–24 US MARKET</text>
  <text x="540" y="930" text-anchor="middle" font-family="Georgia, serif" font-size="19" letter-spacing="4" fill="#c9a84c">HERITAGE APPARELS</text>
  <text x="540" y="980" text-anchor="middle" font-family="Arial" font-size="12" fill="#555">India's #1 US Market Entry Agency for Fashion Brands</text>
  <text x="540" y="1020" text-anchor="middle" font-family="Arial" font-size="11" fill="#333">heritageapparels.com/us/services/performance-marketing</text>
</svg>
