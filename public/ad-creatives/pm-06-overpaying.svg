  <text x="200" y="494" text-anchor="middle" font-family="Arial" font-size="11" fill="#555">India brands in US market</text>
  <text x="500" y="485" text-anchor="middle" font-family="Georgia, serif" font-size="26" font-weight="bold" fill="#ff4444">1.2×–2.1×</text>
  <text x="800" y="478" text-anchor="middle" font-family="Georgia, serif" font-size="26" font-weight="bold" fill="url(#gold)">4.8×–8.2×</text>
