  <line x1="60" y1="390" x2="1020" y2="390" stroke="#1a2030" stroke-width="1"/>
  <text x="200" y="357" text-anchor="middle" font-family="Arial" font-size="14" fill="#888">CPM (Cost per 1000 views)</text>
  <text x="200" y="378" text-anchor="middle" font-family="Arial" font-size="11" fill="#555">US Fashion · Meta Ads</text>
  <text x="500" y="369" text-anchor="middle" font-family="Georgia, serif" font-size="26" font-weight="bold" fill="#ff4444">$38–$55</text>
