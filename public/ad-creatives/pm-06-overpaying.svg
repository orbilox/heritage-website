  <text x="200" y="552" text-anchor="middle" font-family="Arial" font-size="11" fill="#555">Ad click to purchase</text>
  <text x="500" y="543" text-anchor="middle" font-family="Georgia, serif" font-size="26" font-weight="bold" fill="#ff4444">0.8%–1.4%</text>
  <text x="800" y="536" text-anchor="middle" font-family="Georgia, serif" font-size="26" font-weight="bold" fill="url(#gold)">3.2%–5.8%</text>
  <text x="800" y="555" text-anchor="middle" font-family="Arial" font-size="11" fill="#c9a84c">4× higher CVR</text>

  <!-- Row 5 -->
  <rect x="60" y="564" width="960" height="58" rx="0" fill="#0a0e1c"/>
  <text x="200" y="589" text-anchor="middle" font-family="Arial" font-size="14" fill="#888">Monthly agency fee</text>
  <text x="200" y="610" text-anchor="middle" font-family="Arial" font-size="11" fill="#555">Full US campaign management</text>
  <text x="500" y="601" text-anchor="middle" font-family="Georgia, serif" font-size="26" font-weight="bold" fill="#ff4444">$5,000–$12,000</text>
  <text x="800" y="594" text-anchor="middle" font-family="Georgia, serif" font-size="26" font-weight="bold" fill="url(#gold)">$2,000</text>
  <text x="800" y="613" text-anchor="middle" font-family="Arial" font-size="11" fill="#c9a84c">All-inclusive · No hidden fees</text>

  <!-- Border for table -->
  <rect x="60" y="288" width="960" height="334" rx="8" fill="none" stroke="#c9a84c" stroke-width="1" stroke-opacity="0.2"/>

  <!-- Divider line between columns -->
