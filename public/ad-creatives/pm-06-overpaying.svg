  <text x="200" y="316" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#c9a84c" letter-spacing="1">METRIC</text>
  <text x="500" y="316" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#ff4444" letter-spacing="1">INDUSTRY AVERAGE</text>
  <text x="800" y="316" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#c9a84c" letter-spacing="1">HERITAGE CLIENTS</text>

