  <rect x="595" y="528" width="190" height="130" rx="6" fill="#16213e"/>
  <text x="690" y="598" text-anchor="middle" font-family="Arial" font-size="28" fill="#c9a84c" opacity="0.5">✦</text>
  <text x="690" y="622" text-anchor="middle" font-family="Arial" font-size="9" fill="#c9a84c" opacity="0.6">lifestyle + product</text>
  <text x="690" y="638" text-anchor="middle" font-family="Arial" font-size="9" fill="#c9a84c" opacity="0.5">A+ imagery</text>

