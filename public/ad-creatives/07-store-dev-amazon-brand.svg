  <rect x="60" y="408" width="450" height="44" rx="8" fill="#ff4444" opacity="0.15"/>
  <text x="285" y="436" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#ff4444" letter-spacing="1">TYPICAL AMAZON STORE</text>

  <!-- Generic store elements -->
  <rect x="85" y="468" width="400" height="50" rx="6" fill="#111" stroke="#222" stroke-width="1"/>
  <rect x="95" y="478" width="100" height="12" rx="3" fill="#333"/>
  <rect x="95" y="496" width="200" height="8" rx="3" fill="#222"/>
  <text x="445" y="502" text-anchor="end" font-family="Arial" font-size="10" fill="#444">amazon.com</text>

  <rect x="85" y="528" width="190" height="130" rx="6" fill="#111" stroke="#222" stroke-width="1"/>
  <text x="180" y="598" text-anchor="middle" font-family="Arial" font-size="28" fill="#222">🖼</text>
  <text x="180" y="622" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">stock photo</text>
