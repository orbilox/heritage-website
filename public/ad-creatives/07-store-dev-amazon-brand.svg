  <text x="895" y="572" text-anchor="middle" font-family="Arial" font-size="11" fill="#ff9900">★★★★★ 4.8</text>
  <text x="895" y="590" text-anchor="middle" font-family="Georgia, serif" font-size="13" font-weight="bold" fill="#f5d98b">$89.00</text>
  <text x="895" y="610" text-anchor="middle" font-family="Arial" font-size="9" fill="#888">Brand story module</text>
  <text x="895" y="625" text-anchor="middle" font-family="Arial" font-size="9" fill="#888">SEO-rich bullets</text>
  <text x="895" y="640" text-anchor="middle" font-family="Arial" font-size="9" fill="#888">Full A+ content</text>
  <text x="895" y="655" text-anchor="middle" font-family="Arial" font-size="9" fill="#888">Backend keywords</text>

  <text x="795" y="700" text-anchor="middle" font-family="Arial" font-size="12" fill="#c9a84c">✓ Instantly recognisable brand</text>
  <text x="795" y="720" text-anchor="middle" font-family="Arial" font-size="12" fill="#c9a84c">✓ Premium positioning</text>
  <text x="795" y="716" text-anchor="middle" font-family="Arial" font-size="12" fill="#c9a84c">✓ 3–5× higher conversion</text>

  <!-- What we build -->
  <rect x="60" y="758" width="960" height="100" rx="12" fill="#c9a84c" opacity="0.07" stroke="#c9a84c" stroke-width="1" stroke-opacity="0.2"/>
  <text x="540" y="788" text-anchor="middle" font-family="Arial" font-size="12" fill="#c9a84c" letter-spacing="2">WE BUILD YOUR COMPLETE AMAZON BRAND PRESENCE</text>
  <text x="180" y="820" text-anchor="middle" font-family="Arial" font-size="12" fill="#888">Brand Store Design</text>
  <line x1="300" y1="808" x2="300" y2="832" stroke="#c9a84c" stroke-width="1" opacity="0.2"/>
  <text x="390" y="820" text-anchor="middle" font-family="Arial" font-size="12" fill="#888">A+ Content Modules</text>
  <line x1="480" y1="808" x2="480" y2="832" stroke="#c9a84c" stroke-width="1" opacity="0.2"/>
  <text x="540" y="820" text-anchor="middle" font-family="Arial" font-size="12" fill="#888">SEO Listing Copy</text>
  <line x1="600" y1="808" x2="600" y2="832" stroke="#c9a84c" stroke-width="1" opacity="0.2"/>
  <text x="700" y="820" text-anchor="middle" font-family="Arial" font-size="12" fill="#888">Lifestyle Photography</text>
  <line x1="810" y1="808" x2="810" y2="832" stroke="#c9a84c" stroke-width="1" opacity="0.2"/>
  <text x="900" y="820" text-anchor="middle" font-family="Arial" font-size="12" fill="#888">Launch Strategy</text>

  <!-- CTA -->
