  <line x1="60" y1="982" x2="1020" y2="982" stroke="#c9a84c" stroke-width="1" opacity="0.1"/>
  <text x="540" y="1010" text-anchor="middle" font-family="Arial" font-size="12" fill="#444" letter-spacing="1">AMAZON · WALMART · ETSY · SHOPIFY · 25+ PLATFORMS</text>
  <text x="540" y="1048" text-anchor="middle" font-family="Georgia, serif" font-size="16" letter-spacing="4" fill="#c9a84c">HERITAGE APPARELS</text>
  <text x="540" y="1070" text-anchor="middle" font-family="Arial" font-size="11" fill="#333">heritageapparels.com/us/services/store-development</text>
