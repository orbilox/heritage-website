<svg width="1080" height="1080" viewBox="0 0 1080 1080" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a12"/>
      <stop offset="50%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#0d1b3e"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#c9a84c"/>
      <stop offset="50%" style="stop-color:#f5d98b"/>
      <stop offset="100%" style="stop-color:#c9a84c"/>
    </linearGradient>
    <linearGradient id="amz" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff9900"/>
      <stop offset="100%" style="stop-color:#ff6600"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="20" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1080" height="1080" fill="url(#bg)"/>

  <!-- Subtle background glow -->
  <ellipse cx="300" cy="400" rx="300" ry="250" fill="#ff9900" opacity="0.04" filter="url(#softglow)"/>
  <ellipse cx="800" cy="600" rx="300" ry="250" fill="#c9a84c" opacity="0.05" filter="url(#softglow)"/>

  <!-- Top eyebrow -->
  <text x="540" y="68" text-anchor="middle" font-family="Arial" font-size="13" fill="#ff9900" letter-spacing="3" opacity="0.7">AMAZON STORE DEVELOPMENT · BRAND REALITY CHECK</text>

  <!-- NEQ sign - big statement -->
  <text x="540" y="175" text-anchor="middle" font-family="Georgia, serif" font-size="52" fill="#f8f4ef">Your Amazon Store</text>

