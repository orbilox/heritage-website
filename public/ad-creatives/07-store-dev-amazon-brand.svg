  <rect x="285" y="528" width="200" height="130" rx="6" fill="#111" stroke="#222" stroke-width="1"/>
  <text x="385" y="554" text-anchor="middle" font-family="Arial" font-size="9" fill="#444">Product Name B09XYZ...</text>
  <text x="385" y="572" text-anchor="middle" font-family="Arial" font-size="11" fill="#ff9900">★★★☆☆ 3.2</text>
  <text x="385" y="590" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#f5f5f5">$24.99</text>
  <text x="385" y="610" text-anchor="middle" font-family="Arial" font-size="9" fill="#444">No brand story</text>
  <text x="385" y="625" text-anchor="middle" font-family="Arial" font-size="9" fill="#444">Generic bullet points</text>
  <text x="385" y="640" text-anchor="middle" font-family="Arial" font-size="9" fill="#444">No A+ content</text>
  <text x="385" y="655" text-anchor="middle" font-family="Arial" font-size="9" fill="#444">Poor keyword targeting</text>

