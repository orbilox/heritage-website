  <text x="670" y="614" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#4caf50">Shopping</text>
  <text x="670" y="640" text-anchor="middle" font-family="Arial" font-size="11" fill="#888888">High Purchase Intent</text>

  <rect x="810" y="558" width="210" height="100" rx="14" fill="#1a1a2e" stroke="#c9a84c" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="915" y="596" text-anchor="middle" font-family="Georgia" font-size="16" font-weight="bold" fill="#c9a84c">+15 more</text>
  <text x="915" y="618" text-anchor="middle" font-family="Arial" font-size="12" fill="#888888">platforms managed</text>
  <text x="915" y="640" text-anchor="middle" font-family="Arial" font-size="11" fill="#c9a84c">by Heritage</text>

  <!-- Key message -->
  <rect x="60" y="682" width="960" height="68" rx="10" fill="#c9a84c" opacity="0.1" stroke="#c9a84c" stroke-width="1" stroke-opacity="0.3"/>
  <text x="540" y="712" text-anchor="middle" font-family="Georgia" font-size="22" fill="#f8f4ef">We onboard, list, optimize, and <tspan font-weight="bold" fill="url(#gold)">manage your brand</tspan> on all of them.</text>
  <text x="540" y="738" text-anchor="middle" font-family="Arial" font-size="15" fill="#888888">Compliant listings · A+ Content · Marketplace Ads · Ongoing Management</text>

  <!-- Stats row -->
  <text x="190" y="810" text-anchor="middle" font-family="Georgia" font-size="40" font-weight="bold" fill="url(#gold)">25+</text>
  <text x="190" y="838" text-anchor="middle" font-family="Arial" font-size="13" fill="#888888">US Platforms</text>
  <line x1="380" y1="790" x2="380" y2="850" stroke="#c9a84c" stroke-width="1" opacity="0.3"/>
  <text x="540" y="810" text-anchor="middle" font-family="Georgia" font-size="40" font-weight="bold" fill="url(#gold)">$1,800</text>
  <text x="540" y="838" text-anchor="middle" font-family="Arial" font-size="13" fill="#888888">Starting Price (USD)</text>
  <line x1="700" y1="790" x2="700" y2="850" stroke="#c9a84c" stroke-width="1" opacity="0.3"/>
  <text x="890" y="810" text-anchor="middle" font-family="Georgia" font-size="40" font-weight="bold" fill="url(#gold)">2 Weeks</text>
  <text x="890" y="838" text-anchor="middle" font-family="Arial" font-size="13" fill="#888888">To Go Live</text>

  <!-- CTA -->
  <rect x="280" y="878" width="520" height="68" rx="34" fill="url(#gold)"/>
  <text x="540" y="918" text-anchor="middle" font-family="Georgia" font-size="22" font-weight="bold" fill="#1a1a2e">Get Free Eligibility Report →</text>

  <!-- Brand bar -->
  <rect x="0" y="976" width="1080" height="104" fill="#0d0d17"/>
  <text x="540" y="1018" text-anchor="middle" font-family="Arial" font-size="13" fill="#888888" letter-spacing="1">One agency. Every US marketplace. No complexity.</text>
  <text x="540" y="1054" text-anchor="middle" font-family="Georgia" font-size="16" letter-spacing="3" fill="#c9a84c">HERITAGE APPARELS USA</text>
</svg>
