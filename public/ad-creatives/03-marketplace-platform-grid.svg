  <text x="420" y="625" text-anchor="middle" font-family="Arial" font-size="11" fill="#888888">80M Fashion Shoppers</text>

  <rect x="560" y="558" width="220" height="100" rx="14" fill="#1a1a2e" stroke="#4caf50" stroke-width="1.5"/>
