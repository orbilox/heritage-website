  <line x1="60" y1="928" x2="1020" y2="928" stroke="#c9a84c" stroke-width="1" opacity="0.1"/>
  <text x="190" y="970" text-anchor="middle" font-family="Georgia, serif" font-size="20" font-weight="bold" fill="#4285f4">Google Ads</text>
  <text x="190" y="992" text-anchor="middle" font-family="Arial" font-size="11" fill="#555">Search + Shopping + PMax</text>
  <line x1="380" y1="950" x2="380" y2="1002" stroke="#c9a84c" stroke-width="1" opacity="0.15"/>
  <text x="540" y="970" text-anchor="middle" font-family="Georgia, serif" font-size="20" font-weight="bold" fill="#1877f2">Meta Ads</text>
  <text x="540" y="992" text-anchor="middle" font-family="Arial" font-size="11" fill="#555">FB + Instagram + Reels</text>
  <line x1="700" y1="950" x2="700" y2="1002" stroke="#c9a84c" stroke-width="1" opacity="0.15"/>
  <text x="870" y="970" text-anchor="middle" font-family="Georgia, serif" font-size="20" font-weight="bold" fill="#ff9900">Marketplace</text>
  <text x="870" y="992" text-anchor="middle" font-family="Arial" font-size="11" fill="#555">Amazon + Walmart + TikTok</text>
  <text x="540" y="1048" text-anchor="middle" font-family="Georgia, serif" font-size="17" letter-spacing="4" fill="#c9a84c">HERITAGE APPARELS · $599/MONTH</text>
</svg>
