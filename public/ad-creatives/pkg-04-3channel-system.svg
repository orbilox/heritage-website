  <text x="220" y="400" text-anchor="middle" font-family="Arial" font-size="32" font-weight="bold" fill="#4285f4">G</text>
  <text x="220" y="452" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#f8f4ef">Google Ads</text>
  <text x="220" y="476" text-anchor="middle" font-family="Arial" font-size="11" fill="#555">Search &amp; Shopping</text>
