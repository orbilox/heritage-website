    <linearGradient id="chartfill1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4285f4" stop-opacity="0.5"/>
      <stop offset="100%" style="stop-color:#4285f4" stop-opacity="0.03"/>
