<svg width="1080" height="1080" viewBox="0 0 1080 1080" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#060a14"/>
      <stop offset="40%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#0d1b3e"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#c9a84c"/>
      <stop offset="50%" style="stop-color:#f5d98b"/>
      <stop offset="100%" style="stop-color:#c9a84c"/>
    </linearGradient>
    <linearGradient id="freebadge" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5d98b"/>
      <stop offset="100%" style="stop-color:#c9a84c"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="30" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1080" height="1080" fill="url(#bg)"/>
  <ellipse cx="540" cy="350" rx="500" ry="320" fill="#c9a84c" opacity="0.05" filter="url(#softglow)"/>

  <!-- FREE badge - hero element -->
  <circle cx="540" cy="168" r="120" fill="none" stroke="#c9a84c" stroke-width="1.5" opacity="0.3"/>
  <circle cx="540" cy="168" r="100" fill="url(#freebadge)" opacity="0.12"/>
  <text x="540" y="148" text-anchor="middle" font-family="Arial" font-size="16" fill="#c9a84c" letter-spacing="2">100%</text>
  <text x="540" y="192" text-anchor="middle" font-family="Georgia, serif" font-size="54" font-weight="bold" fill="url(#gold)" filter="url(#glow)">FREE</text>

  <!-- Headline -->
  <text x="540" y="316" text-anchor="middle" font-family="Georgia, serif" font-size="46" font-weight="bold" fill="#f8f4ef">US Market Ads Audit</text>
  <text x="540" y="364" text-anchor="middle" font-family="Georgia, serif" font-size="24" fill="#888">We'll find exactly where your budget is leaking.</text>

  <!-- Gold rule -->
  <rect x="200" y="384" width="680" height="2" fill="url(#gold)" rx="1" opacity="0.5"/>

