  <text x="540" y="188" text-anchor="middle" font-family="Georgia, serif" font-size="148" font-weight="bold" fill="#ff4444" filter="url(#redglow)" opacity="0.15">30</text>
  <text x="540" y="188" text-anchor="middle" font-family="Georgia, serif" font-size="148" font-weight="bold" fill="#ff4444" filter="url(#redglow)">30</text>

