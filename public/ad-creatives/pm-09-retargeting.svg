  <text x="540" y="1008" text-anchor="middle" font-family="Georgia, serif" font-size="18" letter-spacing="4" fill="#c9a84c">HERITAGE APPARELS</text>
  <text x="540" y="1034" text-anchor="middle" font-family="Arial" font-size="12" fill="#555">India's #1 US Market Entry Agency · Performance Marketing Specialists</text>
  <text x="540" y="1058" text-anchor="middle" font-family="Arial" font-size="11" fill="#333">heritageapparels.com/us/services/performance-marketing</text>
