  <text x="540" y="724" text-anchor="middle" font-family="Arial" font-size="13" fill="#888">US ad spend managed</text>
  <text x="540" y="744" text-anchor="middle" font-family="Arial" font-size="11" fill="#555">Proven playbooks</text>

  <rect x="720" y="658" width="300" height="110" rx="12" fill="#080e1c" stroke="#c9a84c" stroke-width="1" stroke-opacity="0.3"/>
  <text x="870" y="698" text-anchor="middle" font-family="Georgia, serif" font-size="40" font-weight="bold" fill="url(#gold)">6.4×</text>
